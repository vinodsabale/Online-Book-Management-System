<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New Books | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:220px;min-height:100vh;background:linear-gradient(180deg,#1e3a5f,#2563eb);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.2rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:220px;padding:24px;}
        .book-card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);
            padding:20px;background:#fff;height:100%;}
        .badge-genre{background:#eff6ff;color:#2563eb;font-size:.75rem;padding:4px 10px;border-radius:20px;}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/member/dashboard}">
            <i class="bi bi-speedometer2"></i> My Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/member/my-books}">
            <i class="bi bi-journal-richtext"></i> My Books</a></li>
        <li><a class="nav-link active" th:href="@{/member/new-books}">
            <i class="bi bi-stars"></i> New Books</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}">
            <i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    <h5 class="mb-4"><i class="bi bi-stars me-2"></i>New Books in Library</h5>

    <div class="row g-3">
        <div th:if="${newBooks.isEmpty()}" class="col-12 text-center text-muted py-5">
            No books available.
        </div>
        <div th:each="book : ${newBooks}" class="col-md-4">
            <div class="book-card">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <span class="badge-genre" th:text="${book.bookGenre}">Genre</span>
                    <span th:if="${book.bookAvailableCopies == 0}"
                          class="badge bg-danger">Not Available</span>
                    <span th:if="${book.bookAvailableCopies > 0}"
                          class="badge bg-success"
                          th:text="${book.bookAvailableCopies} + ' Available'"></span>
                </div>
                <h6 class="mt-2 mb-1 fw-bold" th:text="${book.bookTitle}"></h6>
                <small class="text-muted" th:text="'by ' + ${book.bookAuthor}"></small>
                <hr class="my-2"/>
                <div class="d-flex justify-content-between">
                    <small class="text-muted">
                        <i class="bi bi-upc me-1"></i>
                        <span th:text="${book.bookIsbn}"></span>
                    </small>
                    <small class="text-muted">
                        <i class="bi bi-calendar me-1"></i>
                        <span th:text="${book.bookPublishedDate}"></span>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
