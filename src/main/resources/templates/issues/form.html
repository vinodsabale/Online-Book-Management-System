<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Issue Book | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#1e3a5f,#2563eb);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .card-header{background:#fff;border-bottom:1px solid #f0f0f0;padding:16px 20px;font-weight:600;}
        .form-label{font-weight:500;font-size:.875rem;}
        .form-select:focus{border-color:#2563eb;box-shadow:0 0 0 .2rem rgba(37,99,235,.15);}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/books}"><i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link" th:href="@{/users}"><i class="bi bi-people"></i> Users</a></li>
        <li><a class="nav-link active" th:href="@{/issues}"><i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/issues/overdue}"><i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
    </ul>
</nav>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Issue a Book</h5>
        <a th:href="@{/issues}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <div class="card" style="max-width:560px">
        <div class="card-header">
            <i class="bi bi-arrow-left-right me-2"></i> Issue Book to User
        </div>
        <div class="card-body p-4">
            <form th:action="@{/issues}" method="post">
                <div class="mb-3">
                    <label class="form-label">Select Book <span class="text-danger">*</span></label>
                    <select name="bookId" class="form-select" required>
                        <option value="">-- Choose a Book --</option>
                        <option th:each="book : ${books}"
                                th:value="${book.bookId}"
                                th:text="${book.bookTitle} + ' (' + ${book.bookAvailableCopies} + ' available)'"
                                th:disabled="${book.bookAvailableCopies == 0}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select User <span class="text-danger">*</span></label>
                    <select name="userId" class="form-select" required>
                        <option value="">-- Choose a User --</option>
                        <option th:each="user : ${users}"
                                th:value="${user.userId}"
                                th:text="${user.userName} + ' (' + ${user.userEmail} + ')'">
                        </option>
                    </select>
                </div>

                <div class="alert alert-info py-2 px-3" style="font-size:.85rem">
                    <i class="bi bi-info-circle me-1"></i>
                    Default loan period is <strong>14 days</strong>. Fine: ₹5/day after due date.
                </div>

                <div class="mt-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Issue Book
                    </button>
                    <a th:href="@{/issues}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
