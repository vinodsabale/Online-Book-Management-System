<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Books | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#064e3b,#059669);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .topbar{background:#fff;border-radius:12px;padding:14px 24px;
            box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:24px;
            display:flex;justify-content:space-between;align-items:center;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .card-header{background:#fff;border-bottom:1px solid #f0f0f0;padding:16px 20px;font-weight:600;}
        .table th{font-weight:600;font-size:.8rem;text-transform:uppercase;
            letter-spacing:.05em;color:#64748b;background:#f8fafc;border:none;}
        .table td{vertical-align:middle;border-color:#f1f5f9;}
        .page-link{color:#059669;}
        .page-item.active .page-link{background:#059669;border-color:#059669;}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/librarian/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link active" th:href="@{/librarian/books}"><i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link" th:href="@{/librarian/users}"><i class="bi bi-people"></i> Users</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues}"><i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues/overdue}"><i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>
<div class="main-content">
    <div class="topbar">
        <h5 class="mb-0">Books</h5>
        <!-- Add Book button removed — Librarian cannot add books -->
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/librarian/books}" method="get" class="d-flex gap-2 align-items-center flex-wrap">
                <input type="text" name="keyword" class="form-control" style="max-width:300px"
                       placeholder="Search by title or author..." th:value="${keyword}"/>
                <button type="submit" class="btn btn-success"><i class="bi bi-search"></i></button>
                <a th:href="@{/librarian/books}" class="btn btn-outline-secondary">Reset</a>
            </form>
        </div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr>
                    <th>#</th><th>Title</th><th>Author</th><th>Genre</th>
                    <th>Total</th><th>Available</th><th>Actions</th>
                </tr></thead>
                <tbody>
                <tr th:if="${bookPage.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">No books found.</td>
                </tr>
                <tr th:each="book, iter : ${bookPage.content}">
                    <td class="text-muted" th:text="${bookPage.number * bookPage.size + iter.count}"></td>
                    <td th:text="${book.bookTitle}"></td>
                    <td th:text="${book.bookAuthor}"></td>
                    <td><span class="badge bg-light text-dark border" th:text="${book.bookGenre}"></span></td>
                    <td th:text="${book.bookTotalCopies}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${book.bookAvailableCopies == 0} ? 'bg-danger' :
                                             (${book.bookAvailableCopies <= 3} ? 'bg-warning text-dark' : 'bg-success')"
                              th:text="${book.bookAvailableCopies}"></span>
                    </td>
                    <td>
                        <a th:href="@{/librarian/books/{id}/edit(id=${book.bookId})}"
                           class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
            <small class="text-muted">
                Showing <span th:text="${bookPage.numberOfElements}"></span>
                of <span th:text="${bookPage.totalElements}"></span> books
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${bookPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/librarian/books(keyword=${keyword},page=${bookPage.number-1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="pageNum : ${pageNumbers}" class="page-item"
                        th:classappend="${pageNum - 1 == bookPage.number} ? 'active'">
                        <a class="page-link" th:text="${pageNum}"
                           th:href="@{/librarian/books(keyword=${keyword},page=${pageNum-1})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${bookPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/librarian/books(keyword=${keyword},page=${bookPage.number+1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
