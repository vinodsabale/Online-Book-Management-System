<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .error-card{max-width:500px;margin:100px auto;border:none;
            border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);background:#fff;padding:40px;text-align:center;}
    </style>
</head>
<body>
<div class="error-card">
    <i class="bi bi-exclamation-circle text-danger" style="font-size:4rem"></i>
    <h3 class="mt-3 text-danger" th:text="${errorTitle}">Error</h3>
    <p class="text-muted mt-2" th:text="${errorMessage}">Something went wrong.</p>
    <hr/>
    <div class="d-flex justify-content-center gap-2 mt-3">
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Go Back
        </a>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house me-1"></i> Dashboard
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
