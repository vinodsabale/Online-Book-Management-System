<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Email Verification | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .card {
            max-width: 420px; margin: 120px auto;
            border: none; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        .brand {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff; padding: 24px;
            border-radius: 16px 16px 0 0; text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <h4 class="mb-0">📚 BookLib</h4>
        <small>Email Verification</small>
    </div>
    <div class="card-body p-4 text-center">

        <div th:if="${success}">
            <div class="mb-3" style="font-size:48px;">✅</div>
            <h5 class="text-success fw-bold">Email Verified!</h5>
            <p class="text-muted" th:text="${message}"></p>
            <a href="/login" class="btn btn-primary w-100 mt-2">Go to Login</a>
        </div>

        <div th:if="${!success}">
            <div class="mb-3" style="font-size:48px;">❌</div>
            <h5 class="text-danger fw-bold">Verification Failed</h5>
            <p class="text-muted" th:text="${message}"></p>
            <a href="/login" class="btn btn-secondary w-100 mt-2">Back to Login</a>
        </div>

    </div>
</div>
</body>
</html>
