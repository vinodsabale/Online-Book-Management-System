<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .login-card{max-width:400px;margin:100px auto;border:none;
            border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);}
        .brand{background:linear-gradient(135deg,#1e3a5f,#2563eb);
            color:#fff;padding:28px;border-radius:16px 16px 0 0;text-align:center;}
    </style>
</head>
<body>
<div class="card login-card">
    <div class="brand">
        <h4 class="mb-0">📚 BookLib</h4>
        <small>Library Management System</small>
    </div>
    <div class="card-body p-4">

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="username" class="form-control" 
                       placeholder="Enter your email" required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" 
                       placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
