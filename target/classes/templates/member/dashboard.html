<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Dashboard | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:220px;min-height:100vh;background:linear-gradient(180deg,#1e3a5f,#2563eb);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.2rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:220px;padding:24px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .stat-card{padding:20px;border-radius:14px;color:#fff;}
        .table th{font-size:.8rem;text-transform:uppercase;color:#64748b;background:#f8fafc;}
        .table td{vertical-align:middle;}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link active" th:href="@{/member/dashboard}">
            <i class="bi bi-speedometer2"></i> My Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/member/my-books}">
            <i class="bi bi-journal-richtext"></i> My Books</a></li>
        <li><a class="nav-link" th:href="@{/member/new-books}">
            <i class="bi bi-stars"></i> New Books</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}">
            <i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    <h5 class="mb-4">Welcome, <span th:text="${userName}"></span> 👋</h5>

    <!-- Stat cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card" style="background:#2563eb">
                <div class="small opacity-75">Books Issued</div>
                <div class="fs-3 fw-bold" th:text="${myIssues.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card" style="background:#dc2626">
                <div class="small opacity-75">Total Due Amount</div>
                <div class="fs-3 fw-bold">₹<span th:text="${totalFine}">0</span></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card" style="background:#16a34a">
                <div class="small opacity-75">New Books This Month</div>
                <div class="fs-3 fw-bold" th:text="${newBooks.size()}">0</div>
            </div>
        </div>
    </div>

    <!-- My issued books table -->
    <div class="card">
        <div class="card-header fw-semibold">
            <i class="bi bi-journal-richtext me-2"></i> My Issued Books
        </div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr>
                    <th>#</th><th>Book</th><th>Issued On</th>
                    <th>Due Date</th><th>Status</th><th>Fine</th>
                </tr></thead>
                <tbody>
                <tr th:if="${myIssues.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">
                        No books issued yet.
                    </td>
                </tr>
                <tr th:each="issue, iter : ${myIssues}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${issue.bookTitle}"></td>
                    <td th:text="${issue.issuedDate}"></td>
                    <td th:classappend="${issue.fineAmount > 0} ? 'text-danger fw-bold'"
                        th:text="${issue.dueDate}"></td>
                    <td>
                        <span class="badge"
                              th:text="${issue.issueStatus}"
                              th:classappend="${issue.issueStatus == 'RETURNED'} ? 'bg-success' :
                                             (${issue.issueStatus == 'OVERDUE'} ? 'bg-danger' :
                                              'bg-warning text-dark')">
                        </span>
                    </td>
                    <td>
                        <span th:if="${issue.fineAmount > 0}"
                              class="text-danger fw-bold"
                              th:text="'₹' + ${issue.fineAmount}"></span>
                        <span th:if="${issue.fineAmount == 0}" class="text-muted">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
