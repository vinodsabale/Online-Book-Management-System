<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#1e3a5f,#2563eb);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .topbar{background:#fff;border-radius:12px;padding:14px 24px;
            box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:24px;
            display:flex;justify-content:space-between;align-items:center;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/books}"><i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link active" th:href="@{/users}"><i class="bi bi-people"></i> Users</a></li>
        <li><a class="nav-link" th:href="@{/issues}"><i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/issues/overdue}"><i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    <div class="topbar">
        <h5 class="mb-0" th:text="${pageTitle}">User Form</h5>
        <a th:href="@{/users}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <div class="card">
        <div class="card-body p-4">

            <!-- ADD form: POST /users -->
            <form th:if="${user.userId == null}"
                  th:action="@{/users}"
                  th:object="${user}"
                  method="post">

                <input type="hidden" th:field="*{userId}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Name</label>
                    <input type="text" th:field="*{userName}" class="form-control" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('userName')}"
                         th:errors="*{userName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" th:field="*{userEmail}" class="form-control" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('userEmail')}"
                         th:errors="*{userEmail}"></div>
                </div>

                <!-- PASSWORD — ADD form only -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" th:field="*{password}"
                           class="form-control" placeholder="Set login password" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Phone</label>
                    <input type="text" th:field="*{userPhone}" class="form-control"/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Role</label>
                    <select th:field="*{userRole}" class="form-select" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" th:field="*{userActive}" class="form-check-input"/>
                    <label class="form-check-label">Active</label>
                </div>

                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-lg me-1"></i> Save
                </button>
                <a th:href="@{/users}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>

            <!-- EDIT form: POST /users/{id} -->
            <form th:if="${user.userId != null}"
                  th:action="@{/users/{id}(id=${user.userId})}"
                  th:object="${user}"
                  method="post">

                <input type="hidden" th:field="*{userId}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Name</label>
                    <input type="text" th:field="*{userName}" class="form-control" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('userName')}"
                         th:errors="*{userName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" th:field="*{userEmail}" class="form-control" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('userEmail')}"
                         th:errors="*{userEmail}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Phone</label>
                    <input type="text" th:field="*{userPhone}" class="form-control"/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Role</label>
                    <select th:field="*{userRole}" class="form-select" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" th:field="*{userActive}" class="form-check-input"/>
                    <label class="form-check-label">Active</label>
                </div>

                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-lg me-1"></i> Update
                </button>
                <a th:href="@{/users}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
