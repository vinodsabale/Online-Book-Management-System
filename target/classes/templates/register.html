<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .register-card {
            max-width: 450px; margin: 60px auto;
            border: none; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        .brand {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff; padding: 24px;
            border-radius: 16px 16px 0 0; text-align: center;
        }
    </style>
</head>
<body>
<div class="card register-card">
    <div class="brand">
        <h4 class="mb-0">📚 BookLib</h4>
        <small>Create your account</small>
    </div>
    <div class="card-body p-4">

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" th:field="*{userName}" class="form-control" placeholder="Enter your name" required/>
                <span th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="text-danger small"></span>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" th:field="*{userEmail}" class="form-control" placeholder="Enter your email" required/>
                <span th:if="${#fields.hasErrors('userEmail')}" th:errors="*{userEmail}" class="text-danger small"></span>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" th:field="*{userPhone}" class="form-control" placeholder="Enter phone number"/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Create password" required/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Role</label>
                <select th:field="*{userRole}" class="form-select">
                    <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <small>Already have an account? <a href="/login">Login here</a></small>
        </div>
    </div>
</div>
</body>
</html>
