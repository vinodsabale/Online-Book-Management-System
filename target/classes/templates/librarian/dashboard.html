<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Librarian Dashboard | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#064e3b,#059669);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .topbar{background:#fff;border-radius:12px;padding:14px 24px;
            box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:24px;
            display:flex;justify-content:space-between;align-items:center;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .card-header{background:#fff;border-bottom:1px solid #f0f0f0;padding:16px 20px;font-weight:600;}
        .stat-card{border-radius:14px;padding:24px;color:#fff;}
        .table th{font-weight:600;font-size:.8rem;text-transform:uppercase;
            color:#64748b;background:#f8fafc;border:none;}
        .table td{vertical-align:middle;border-color:#f1f5f9;}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link active" th:href="@{/librarian/dashboard}">
            <i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/librarian/books}">
            <i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link" th:href="@{/librarian/users}">
            <i class="bi bi-people"></i> Users</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues}">
            <i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues/overdue}">
            <i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
        <li class="mt-5">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link border-0 bg-transparent text-danger w-100">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </li>
    </ul>
</nav>

<div class="main-content">
  <h5 class="mb-4">Welcome, <span th:text="${userName}"></span> 👋</h5>

    <div class="topbar">
        <h5 class="mb-0">Librarian Dashboard</h5>
        <div class="d-flex align-items-center gap-3">
            <small class="text-muted"
                   th:text="${#dates.format(#dates.createNow(),'dd MMM yyyy')}"></small>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(135deg,#2563eb,#1d4ed8)">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div style="opacity:.75;font-size:.8rem">Total Books</div>
                        <div style="font-size:2rem;font-weight:700" th:text="${totalBooks}">0</div>
                    </div>
                    <i class="bi bi-journal-richtext" style="font-size:2.5rem;opacity:.4"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(135deg,#0891b2,#0e7490)">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div style="opacity:.75;font-size:.8rem">Total Members</div>
                        <div style="font-size:2rem;font-weight:700" th:text="${totalUsers}">0</div>
                    </div>
                    <i class="bi bi-people" style="font-size:2.5rem;opacity:.4"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(135deg,#059669,#047857)">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div style="opacity:.75;font-size:.8rem">Active Issues</div>
                        <div style="font-size:2rem;font-weight:700" th:text="${activeIssues}">0</div>
                    </div>
                    <i class="bi bi-arrow-left-right" style="font-size:2.5rem;opacity:.4"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(135deg,#dc2626,#b91c1c)">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div style="opacity:.75;font-size:.8rem">Overdue</div>
                        <div style="font-size:2rem;font-weight:700" th:text="${overdueIssues}">0</div>
                    </div>
                    <i class="bi bi-exclamation-triangle" style="font-size:2.5rem;opacity:.4"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header d-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-circle text-warning"></i> Low Stock Books
                    <span class="badge bg-warning text-dark ms-1" th:text="${lowStockBooks.size()}"></span>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead><tr><th>Title</th><th>Available</th><th>Action</th></tr></thead>
                        <tbody>
                        <tr th:if="${lowStockBooks.isEmpty()}">
                            <td colspan="3" class="text-center text-muted py-3">All books well stocked.</td>
                        </tr>
                        <tr th:each="book : ${lowStockBooks}">
                            <td th:text="${book.bookTitle}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${book.bookAvailableCopies == 0} ? 'bg-danger' : 'bg-warning text-dark'"
                                      th:text="${book.bookAvailableCopies} + ' left'"></span>
                            </td>
                            <td>
                                <a th:href="@{/librarian/books/{id}/edit(id=${book.bookId})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-clock-history me-2"></i> Recent Issues</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead><tr><th>Book</th><th>Member</th><th>Due Date</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:if="${recentIssues.isEmpty()}">
                            <td colspan="4" class="text-center text-muted py-3">No recent issues.</td>
                        </tr>
                        <tr th:each="issue : ${recentIssues}">
                            <td th:text="${issue.bookTitle}"></td>
                            <td th:text="${issue.userName}"></td>
                            <td th:text="${issue.dueDate}"></td>
                            <td>
                                <span class="badge"
                                      th:text="${issue.issueStatus}"
                                      th:classappend="${issue.issueStatus == 'RETURNED'} ? 'bg-success' :
                                                     (${issue.issueStatus == 'OVERDUE'} ? 'bg-danger' : 'bg-warning text-dark')">
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
