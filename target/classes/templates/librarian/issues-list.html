<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Issues | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#064e3b,#059669);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .topbar{background:#fff;border-radius:12px;padding:14px 24px;
            box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:24px;
            display:flex;justify-content:space-between;align-items:center;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .table th{font-weight:600;font-size:.8rem;text-transform:uppercase;
            letter-spacing:.05em;color:#64748b;background:#f8fafc;border:none;}
        .table td{vertical-align:middle;border-color:#f1f5f9;}
        .page-link{color:#059669;}
        .page-item.active .page-link{background:#059669;border-color:#059669;}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/librarian/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link" th:href="@{/librarian/books}"><i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link" th:href="@{/librarian/users}"><i class="bi bi-people"></i> Users</a></li>
        <li><a class="nav-link active" th:href="@{/librarian/issues}"><i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues/overdue}"><i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <h5 class="mb-0">Issues</h5>
            <span th:if="${overdueCount > 0}" class="badge bg-danger"
                  th:text="${overdueCount} + ' overdue'"></span>
        </div>
        <a th:href="@{/librarian/issues/new}" class="btn btn-success btn-sm">
            <i class="bi bi-plus-lg me-1"></i> Issue Book
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="mb-3">
        <a th:href="@{/librarian/issues}" class="btn btn-sm me-1"
           th:classappend="${selectedStatus == ''} ? 'btn-success' : 'btn-outline-secondary'">All</a>
        <a th:href="@{/librarian/issues(status='ISSUED')}" class="btn btn-sm me-1"
           th:classappend="${selectedStatus == 'ISSUED'} ? 'btn-success' : 'btn-outline-secondary'">Issued</a>
        <a th:href="@{/librarian/issues(status='RETURNED')}" class="btn btn-sm me-1"
           th:classappend="${selectedStatus == 'RETURNED'} ? 'btn-success' : 'btn-outline-secondary'">Returned</a>
        <a th:href="@{/librarian/issues(status='OVERDUE')}" class="btn btn-sm"
           th:classappend="${selectedStatus == 'OVERDUE'} ? 'btn-danger' : 'btn-outline-danger'">Overdue</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr>
                    <th>#</th><th>Book</th><th>Member</th>
                    <th>Issued On</th><th>Due Date</th><th>Status</th><th>Fine</th><th>Action</th>
                </tr></thead>
                <tbody>
                <tr th:if="${issuePage.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-4">No records found.</td>
                </tr>
                <tr th:each="issue, iter : ${issuePage.content}">
                    <td th:text="${issuePage.number * issuePage.size + iter.count}"></td>
                    <td th:text="${issue.bookTitle}"></td>
                    <td th:text="${issue.userName}"></td>
                    <td th:text="${issue.issuedDate}"></td>
                    <td th:text="${issue.dueDate}"></td>
                    <td>
                        <span class="badge"
                              th:text="${issue.issueStatus}"
                              th:classappend="${issue.issueStatus == 'RETURNED'} ? 'bg-success' :
                                             (${issue.issueStatus == 'OVERDUE'} ? 'bg-danger' : 'bg-warning text-dark')">
                        </span>
                    </td>
                    <td>
                        <span th:if="${issue.fineAmount > 0}" class="text-danger"
                              th:text="'₹' + ${issue.fineAmount}"></span>
                        <span th:if="${issue.fineAmount == 0}" class="text-muted">—</span>
                    </td>
                    <td>
                        <a th:if="${issue.issueStatus != 'RETURNED'}"
                           th:href="@{/librarian/issues/{id}/return(id=${issue.issueId})}"
                           class="btn btn-sm btn-success"
                           onclick="return confirm('Confirm return?')">
                            <i class="bi bi-box-arrow-in-left me-1"></i> Return
                        </a>
                        <span th:if="${issue.issueStatus == 'RETURNED'}" class="text-muted small">Returned</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
            <small class="text-muted">
                Showing <span th:text="${issuePage.numberOfElements}"></span>
                of <span th:text="${issuePage.totalElements}"></span>
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${issuePage.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/librarian/issues(status=${selectedStatus},page=${issuePage.number-1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="pageNum : ${pageNumbers}" class="page-item"
                        th:classappend="${pageNum - 1 == issuePage.number} ? 'active'">
                        <a class="page-link" th:text="${pageNum}"
                           th:href="@{/librarian/issues(status=${selectedStatus},page=${pageNum-1})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${issuePage.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/librarian/issues(status=${selectedStatus},page=${issuePage.number+1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
