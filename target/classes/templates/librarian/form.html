<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit Book | BookLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#064e3b,#059669);
            position:fixed;top:0;left:0;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;
            padding:16px 20px 24px;border-bottom:1px solid rgba(255,255,255,.15);}
        .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;
            border-radius:0 30px 30px 0;margin-right:12px;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15);}
        .main-content{margin-left:240px;padding:24px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .card-header{background:#fff;border-bottom:1px solid #f0f0f0;padding:16px 20px;font-weight:600;}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand"><i class="bi bi-book-half me-2"></i> BookLib</div>
    <ul class="nav flex-column mt-3">
        <li><a class="nav-link" th:href="@{/librarian/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li><a class="nav-link active" th:href="@{/librarian/books}"><i class="bi bi-journal-richtext"></i> Books</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues}"><i class="bi bi-arrow-left-right"></i> Issues</a></li>
        <li><a class="nav-link" th:href="@{/librarian/issues/overdue}"><i class="bi bi-exclamation-triangle"></i> Overdue</a></li>
        <li><a class="nav-link text-danger mt-5" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 th:text="${pageTitle}">Book Form</h5>
        <a th:href="@{/librarian/books}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back to Books
        </a>
    </div>

    <div class="card" style="max-width:680px">
        <div class="card-header" th:text="${pageTitle}"></div>
        <div class="card-body p-4">

            <form th:action="@{/librarian/books/{id}(id=${book.bookId})}"
                  th:object="${book}" method="post" novalidate>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{bookTitle}"
                               th:classappend="${#fields.hasErrors('bookTitle')} ? 'is-invalid'"
                               placeholder="Enter book title"/>
                        <div class="invalid-feedback" th:errors="*{bookTitle}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Author <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{bookAuthor}"
                               th:classappend="${#fields.hasErrors('bookAuthor')} ? 'is-invalid'"
                               placeholder="Author name"/>
                        <div class="invalid-feedback" th:errors="*{bookAuthor}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">ISBN</label>
                        <input type="text" class="form-control" th:field="*{bookIsbn}"
                               placeholder="e.g. 978-0134685991"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" th:field="*{bookGenre}"
                               placeholder="e.g. Technology, Fiction"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Published Date</label>
                        <input type="date" class="form-control" th:field="*{bookPublishedDate}"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Total Copies</label>
                        <input type="number" class="form-control" th:field="*{bookTotalCopies}"
                               min="0" placeholder="0"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Available Copies</label>
                        <input type="number" class="form-control" th:field="*{bookAvailableCopies}"
                               min="0" placeholder="0"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Active</label>
                        <input type="checkbox" class="form-check-input" th:field="*{bookActive}"/>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>
                        <span>Update Book</span>
                    </button>
                    <a th:href="@{/librarian/books}" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
